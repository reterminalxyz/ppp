<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Sono un tossico fallito</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Bungee&family=VT323&display=swap" rel="stylesheet">
 <script src="https://cdn.tailwindcss.com"></script>
 <script type="importmap">
  {
   "imports": {
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom": "https://esm.sh/react-dom@^19.1.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.1.0/client"
   }
  }
 </script>
 <script>
  tailwind.config = {
   theme: {
    extend: {
     colors: {
      mex: {
       pink: '#FF1493',
       orange: '#FF8C00',
       red: '#D22B2B',
       dark: '#1A0B0C',
       green: '#39FF14'
      }
     },
     fontFamily: {
      mono: ['"VT323"', 'Courier', 'monospace'],
      sans: ['"Helvetica Neue"', 'Arial', 'sans-serif'],
      display: ['"Bungee"', 'cursive'],
     }
    }
   }
  }
 </script>
 <style>
  body { 
    margin: 0; 
    padding: 0; 
    overflow: hidden; 
    background-color: #0a0005; 
    color: #fff;
  }

  /* SLOW TRIPPY BACKGROUND */
  .trippy-bg {
    background: linear-gradient(45deg, #0a0005, #2a0014, #001111, #1a001a);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* READABLE GLITCH TEXT */
  .glitch-readable {
    position: relative;
    color: #ffffff;
    text-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
  }

  .glitch-readable::before, .glitch-readable::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    pointer-events: none;
  }

  .glitch-readable::before {
    left: 3px;
    text-shadow: -3px 0 #FF1493;
    clip: rect(24px, 550px, 90px, 0);
    animation: glitch-anim 3s infinite linear alternate-reverse;
  }

  .glitch-readable::after {
    left: -3px;
    text-shadow: 3px 0 #00FFFF;
    clip: rect(85px, 550px, 140px, 0);
    animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
  }

  @keyframes glitch-anim {
    0% { clip: rect(15px, 9999px, 94px, 0); transform: translate(0); }
    10% { clip: rect(88px, 9999px, 12px, 0); transform: translate(-2px, 1px); }
    20% { clip: rect(34px, 9999px, 76px, 0); transform: translate(2px, -1px); }
    30% { clip: rect(92px, 9999px, 45px, 0); transform: translate(-2px, 2px); }
    40% { clip: rect(12px, 9999px, 88px, 0); transform: translate(2px, -2px); }
    50% { clip: rect(67px, 9999px, 23px, 0); transform: translate(-1px, 1px); }
    60% { clip: rect(45px, 9999px, 56px, 0); transform: translate(1px, -1px); }
    70% { clip: rect(89px, 9999px, 12px, 0); transform: translate(-2px, 1px); }
    80% { clip: rect(23px, 9999px, 78px, 0); transform: translate(2px, -1px); }
    90% { clip: rect(56px, 9999px, 34px, 0); transform: translate(-1px, 2px); }
    100% { clip: rect(12px, 9999px, 90px, 0); transform: translate(0); }
  }

  @keyframes glitch-anim-2 {
    0% { clip: rect(65px, 9999px, 100px, 0); transform: translate(0); }
    10% { clip: rect(32px, 9999px, 54px, 0); transform: translate(2px, -1px); }
    20% { clip: rect(89px, 9999px, 12px, 0); transform: translate(-2px, 1px); }
    30% { clip: rect(12px, 9999px, 76px, 0); transform: translate(2px, -2px); }
    40% { clip: rect(54px, 9999px, 34px, 0); transform: translate(-2px, 2px); }
    50% { clip: rect(90px, 9999px, 12px, 0); transform: translate(1px, -1px); }
    60% { clip: rect(23px, 9999px, 89px, 0); transform: translate(-1px, 1px); }
    70% { clip: rect(76px, 9999px, 45px, 0); transform: translate(2px, -1px); }
    80% { clip: rect(12px, 9999px, 90px, 0); transform: translate(-2px, 1px); }
    90% { clip: rect(45px, 9999px, 23px, 0); transform: translate(1px, -2px); }
    100% { clip: rect(89px, 9999px, 56px, 0); transform: translate(0); }
  }

  /* SCANLINES */
  .scanlines {
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.5));
    background-size: 100% 6px;
    animation: scroll-scanlines 4s linear infinite;
  }

  @keyframes scroll-scanlines {
    0% { background-position: 0 0; }
    100% { background-position: 0 100vh; }
  }

  /* NOISE */
  .noise-bg {
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  }

  /* SLOW PULSE */
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.1); }
  }
  .animate-pulse-glow {
    animation: pulse-glow 4s ease-in-out infinite;
  }

  /* FALLING CACTI */
  @keyframes fall {
    0% { transform: translateY(-20vh) rotate(var(--start-rot)); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(120vh) rotate(var(--end-rot)); opacity: 0; }
  }
  .falling-cactus {
    position: absolute;
    top: -150px;
    animation: fall linear infinite;
    will-change: transform;
  }
 </style>
</head>
<body>
 <div id="root"></div>
 <script type="module" src="./index.tsx"></script>
</body>
</html>
